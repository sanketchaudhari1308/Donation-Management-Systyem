<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaigns - HopeShare</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-hand-holding-heart me-2"></i>HopeShare
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Dynamic content will be loaded by JS -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Campaigns Section -->
    <section class="pt-5 mt-5">
        <div class="container">
            <div class="text-center mb-5" data-aos="fade-up">
                <h1 class="display-4 fw-bold" style="color: #667eea;">Active Campaigns</h1>
                <p class="lead text-muted">Browse through our active campaigns and make a difference today</p>
            </div>
            
            <!-- Filters -->
            <div class="row mb-4" data-aos="fade-up">
                <div class="col-md-4">
                    <select class="form-select" id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Education">Education</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Food">Food</option>
                        <option value="Emergency">Emergency</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" id="sortFilter">
                        <option value="latest">Sort by: Latest</option>
                        <option value="mostFunded">Most Funded</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search campaigns...">
                </div>
            </div>

            <!-- Campaigns Grid -->
            <div class="row" id="campaignsGrid">
                <!-- Campaigns will be loaded dynamically -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
        
        // Filter functionality
        document.getElementById('categoryFilter').addEventListener('change', filterCampaigns);
        document.getElementById('sortFilter').addEventListener('change', filterCampaigns);
        document.getElementById('searchInput').addEventListener('keyup', filterCampaigns);
        
        async function filterCampaigns() {
            const category = document.getElementById('categoryFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            try {
                let url = 'https://donation-management-backend.onrender.com/campaigns/?status=active';
                if (category) {
                    url += `&category=${category}`;
                }
                
                const response = await fetch(url);
                if (response.ok) {
                    let campaigns = await response.json();
                    
                    // Apply search filter
                    if (search) {
                        campaigns = campaigns.filter(c => 
                            c.title.toLowerCase().includes(search) || 
                            (c.description && c.description.toLowerCase().includes(search))
                        );
                    }
                    
                    displayCampaigns(campaigns);
                }
            } catch (error) {
                console.error('Error filtering campaigns:', error);
            }
        }
    </script>
</body>
</html>
