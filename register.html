<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HopeShare</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-hand-holding-heart me-2"></i>HopeShare
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="campaigns.html">Campaigns</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-light text-primary px-4 ms-3" href="index.html">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <section class="pt-5 mt-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card border-0 shadow-lg rounded-4" data-aos="fade-up">
                        <div class="card-header bg-transparent border-0 text-center pt-4">
                            <h3 class="fw-bold" style="color: #667eea;">Create an Account</h3>
                            <p class="text-muted">Join HopeShare today</p>
                        </div>
                        <div class="card-body p-4">
                            <!-- User Type Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">I want to register as:</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="userTypeRadio" id="userRadio" value="user" checked>
                                        <label class="form-check-label" for="userRadio">
                                            <i class="fas fa-user me-1"></i>Donor
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="userTypeRadio" id="ngoRadio" value="ngo">
                                        <label class="form-check-label" for="ngoRadio">
                                            <i class="fas fa-building me-1"></i>NGO
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Registration Form -->
                            <form id="registerForm">
                                <input type="hidden" id="userType" name="userType" value="user">
                                
                                <div class="mb-3">
                                    <label class="form-label">Full Name *</label>
                                    <input type="text" class="form-control form-control-lg" id="fullName" placeholder="Enter your full name" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Username *</label>
                                    <input type="text" class="form-control form-control-lg" id="username" placeholder="Choose a username" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Email *</label>
                                    <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter your email" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Password *</label>
                                    <input type="password" class="form-control form-control-lg" id="password" placeholder="Create a password" required>
                                    <small class="text-muted">Minimum 6 characters</small>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control form-control-lg" id="phone" placeholder="Enter your phone number">
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label">Address</label>
                                    <textarea class="form-control" id="address" rows="2" placeholder="Enter your address"></textarea>
                                </div>
                                
                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label" for="terms">I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a></label>
                                </div>
                                
                                <button type="submit" class="btn btn-primary btn-lg w-100" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                                    <i class="fas fa-user-plus me-2"></i>Register
                                </button>
                            </form>
                            
                            <div class="text-center mt-4">
                                <p class="text-muted">Already have an account? <a href="index.html" class="text-primary">Login here</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
        
        // Handle user type radio buttons
        document.addEventListener('DOMContentLoaded', function() {
            const userRadio = document.getElementById('userRadio');
            const ngoRadio = document.getElementById('ngoRadio');
            const userTypeInput = document.getElementById('userType');
            
            userRadio.addEventListener('change', function() {
                if (this.checked) {
                    userTypeInput.value = 'user';
                }
            });
            
            ngoRadio.addEventListener('change', function() {
                if (this.checked) {
                    userTypeInput.value = 'ngo';
                }
            });
            
            // Set based on URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            if (type === 'ngo') {
                ngoRadio.checked = true;
                userTypeInput.value = 'ngo';
            } else {
                userRadio.checked = true;
                userTypeInput.value = 'user';
            }
        });
    </script>
</body>
</html>
